<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A2E">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Souma Parfumerie — Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=__PORTAL_V__">
</head>
<body>
  <script>
  (function () {
    var v = '__PORTAL_V__';
    var key = 'souma_portal_v';
    var prev = sessionStorage.getItem(key);
    if (prev && prev !== v) {
      sessionStorage.setItem(key, v);
      location.replace(location.pathname + '?_=' + v);
      return;
    }
    sessionStorage.setItem(key, v);
    window.PORTAL_ASSET_V = v;
  })();
  </script>
  <div id="app">
    <section id="login-view" class="view">
      <div class="login-wrap">
        <div class="login-card card">
          <img src="assets/logo.jpg" alt="Souma Parfumerie" class="login-logo">
          <h1 data-i18n="appTitle">Souma Parfumerie</h1>
          <p class="muted" data-i18n="appSubtitle">Espace Manager</p>
          <div class="lang-toggle login-lang">
            <button type="button" class="lang-btn active" data-lang="fr">FR</button>
            <button type="button" class="lang-btn" data-lang="ar">AR</button>
          </div>
          <form id="login-form" class="login-form">
            <label><span data-i18n="username">Identifiant</span><input type="text" id="username" autocomplete="username" required></label>
            <label class="password-field">
              <span data-i18n="password">Mot de passe</span>
              <div class="password-input-wrap">
                <input type="password" id="password" autocomplete="current-password" required>
                <button type="button" class="password-toggle" id="password-toggle" aria-label="Afficher le mot de passe" aria-pressed="false" tabindex="-1">
                  <svg class="icon-eye-open" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                  <svg class="icon-eye-closed hidden" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16A5.89 5.89 0 0112 7zM2 4.27l2.28 2.28.46.46A11.8 11.8 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55a3 3 0 004.24 4.24l1.55 1.55a5 5 0 00-7.34-7.34z"/></svg>
                </button>
              </div>
            </label>
            <label class="remember-row">
              <input type="checkbox" id="remember-username" checked>
              <span data-i18n="rememberUsername">Se souvenir de l'identifiant</span>
            </label>
            <p id="login-error" class="form-error hidden"></p>
            <button type="submit" class="btn btn-primary" id="login-btn" data-i18n="login">Se connecter</button>
          </form>
          <p class="hint muted" data-i18n="loginHint">Compte Manager requis</p>
        </div>
      </div>
    </section>

    <section id="main-view" class="view hidden">
      <header class="app-header">
        <button type="button" class="btn btn-ghost btn-sm sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
        <div class="header-brand">
          <img src="assets/logo.jpg" alt="" class="header-logo">
          <div>
            <div class="header-title" data-i18n="appTitle">Souma Parfumerie</div>
            <div class="header-user">
              <span id="user-name">Manager</span>
              <span id="page-title" class="header-page hidden"></span>
            </div>
          </div>
        </div>
        <div class="header-actions header-actions--desktop">
          <div class="lang-toggle">
            <button type="button" class="lang-btn active" data-lang="fr">FR</button>
            <button type="button" class="lang-btn" data-lang="ar">AR</button>
          </div>
          <button type="button" class="btn btn-ghost btn-sm logout-btn" data-i18n="logout">Déconnexion</button>
        </div>
      </header>

      <div class="app-layout">
        <div id="sidebar-backdrop" class="sidebar-backdrop hidden" aria-hidden="true"></div>
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-brand">
            <img src="assets/logo.jpg" alt="" class="sidebar-logo">
            <div class="sidebar-brand-text">
              <span class="sidebar-brand-title" data-i18n="appTitle">Souma Parfumerie</span>
              <span class="sidebar-brand-sub" data-i18n="appSubtitle">Espace Manager</span>
            </div>
          </div>
          <nav class="sidebar-nav" id="sidebar-nav" aria-label="Navigation principale"></nav>
          <div class="sidebar-footer">
            <p class="sidebar-footer-user" id="sidebar-user-name"></p>
            <div class="lang-toggle sidebar-lang">
              <button type="button" class="lang-btn active" data-lang="fr">FR</button>
              <button type="button" class="lang-btn" data-lang="ar">AR</button>
            </div>
            <button type="button" class="btn btn-sidebar-logout logout-btn" data-i18n="logout">Déconnexion</button>
          </div>
        </aside>
        <main id="content-area" class="content-area"></main>
      </div>
    </section>
  </div>

  <dialog id="detail-modal" class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Détail</h3>
      <button type="button" class="btn btn-ghost btn-sm modal-close">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-actions" class="modal-actions hidden">
      <button type="button" class="btn btn-outline-danger" id="modal-reject" data-i18n="reject">Refuser</button>
      <button type="button" class="btn btn-primary" id="modal-approve" data-i18n="approve">Approuver</button>
    </div>
  </dialog>

  <dialog id="form-modal" class="modal modal-form">
    <div class="modal-shell">
      <div class="modal-header modal-header--form">
        <div class="modal-header-text">
          <span class="form-mode-badge" id="form-modal-badge" aria-hidden="true"></span>
          <h3 id="form-modal-title">Formulaire</h3>
          <p id="form-modal-subtitle" class="modal-subtitle"></p>
        </div>
        <button type="button" class="btn-icon form-modal-close" aria-label="Fermer">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="form-modal-body" class="modal-body modal-body--form"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary form-modal-close" data-i18n="cancel">Annuler</button>
        <button type="button" class="btn btn-primary" id="form-modal-save">
          <span class="btn-label" data-i18n="save">Enregistrer</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <div id="loader" class="loader hidden"><div class="spinner"></div></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="i18n.js?v=__PORTAL_V__"></script>
  <script src="app.js?v=__PORTAL_V__"></script>
  <script src="report-pdf.js?v=__PORTAL_V__"></script>
  <script src="portal-modules.js?v=__PORTAL_V__"></script>
</body>
</html>
